[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# ── FalkorDB (priority 1) ─────────────────────────────────────────
[program:falkordb]
command=/usr/local/bin/redis-server --loadmodule /opt/falkordb/falkordb.so --dir /data --appendonly yes --save 60 1 --protected-mode no --bind 0.0.0.0 --port 6379
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ── PostgreSQL (priority 1) ───────────────────────────────────────
[program:postgres]
command=/usr/local/bin/init-postgres.sh
autostart=true
autorestart=true
priority=1
user=root
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ── Graphiti REST server (priority 2) ─────────────────────────────
[program:graphiti-server]
command=python3 -m uvicorn main:app --host 0.0.0.0 --port 8000
directory=/app/graphiti-server
autostart=true
autorestart=true
priority=2
startsecs=5
environment=PYTHONUNBUFFERED="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ── Agent (LangGraph + FastAPI) (priority 3) ──────────────────────
[program:agent]
command=python3 -m uvicorn agent.main:app --host 0.0.0.0 --port 5001
directory=/app
autostart=true
autorestart=true
priority=3
startsecs=5
environment=PYTHONUNBUFFERED="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# ── Gateway (Hono/Bun WebSocket) (priority 4) ─────────────────────
[program:gateway]
command=/root/.bun/bin/bun src/index.ts
directory=/app/gateway
autostart=true
autorestart=true
priority=4
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
