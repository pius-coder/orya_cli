version: "3.9"

# ── Environnement de Développement Hybride (Code Local, Bases Distantes) ──
# Utilisez `docker-compose up --build` pour lancer l'environnement.
# Les dossiers locaux sont montés dans les conteneurs pour le Hot-Reload.
# Assurez-vous que votre fichier .env pointe vers les bases distantes (Coolify).

services:
  graphiti-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: ""
    # Hot-reload activé
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    working_dir: /app/graphiti-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./graphiti-server:/app/graphiti-server
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    # Hot-reload activé
    command: ["python3", "-m", "uvicorn", "agent.main:app", "--host", "0.0.0.0", "--port", "5001", "--reload"]
    working_dir: /app
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./agent:/app/agent
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    # Hot-reload Bun activé
    command: ["/root/.bun/bin/bun", "run", "--hot", "src/index.ts"]
    working_dir: /app/gateway
    ports:
      - "4001:4001"
    env_file:
      - .env
    volumes:
      - ./gateway:/app/gateway
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  # Plus de volumes de données nécessaires en local

