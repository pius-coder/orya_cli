version: "3.9"

# Split-mode dev compose. Production deploys the all-in-one Dockerfile
# (single container) — see Dockerfile for that path.

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3000:3000"  # FalkorDB Browser
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orya}
      POSTGRES_USER: ${POSTGRES_USER:-orya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orya_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  graphiti-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: ""
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /app/graphiti-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - falkordb
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "-m", "uvicorn", "agent.main:app", "--host", "0.0.0.0", "--port", "5001"]
    working_dir: /app
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      - falkordb
      - postgres
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/root/.bun/bin/bun", "src/index.ts"]
    working_dir: /app/gateway
    ports:
      - "4001:4001"
    env_file:
      - .env
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  falkordb_data:
  postgres_data:
